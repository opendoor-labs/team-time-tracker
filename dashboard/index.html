<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Team Time Tracker — TL Dashboard</title>
<style>
  :root {
    --bg: #0b0f14;
    --card: #141a22;
    --card-hover: #1a212b;
    --border: #222b38;
    --text: #e6edf5;
    --muted: #8a94a3;
    --accent: #5b8cff;
    --accent-hover: #7aa0ff;
    --purple: #a874ff;
    --blue: #5b8cff;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 20px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .header h1 {
    font-size: 16px;
    font-weight: 600;
    margin: 0;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .email-chip {
    color: var(--muted);
    font-size: 13px;
  }

  .role-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .role-badge.super-admin {
    background: rgba(168, 116, 255, 0.15);
    color: var(--purple);
    border: 1px solid rgba(168, 116, 255, 0.3);
  }

  .role-badge.tl {
    background: rgba(91, 140, 255, 0.15);
    color: var(--blue);
    border: 1px solid rgba(91, 140, 255, 0.3);
  }

  input[type="date"], input[type="email"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    color-scheme: dark;
  }

  input[type="date"]:focus, input[type="email"]:focus {
    outline: none;
    border-color: var(--accent);
  }

  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s;
  }

  button:hover { background: var(--accent-hover); }

  button.secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }

  button.secondary:hover {
    background: var(--card-hover);
    border-color: var(--muted);
  }

  button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .updated-at {
    color: var(--muted);
    font-size: 12px;
  }

  /* Tabs */
  .tabs-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px;
    margin-bottom: 16px;
    overflow-x: auto;
    white-space: nowrap;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .tabs-wrap::-webkit-scrollbar { height: 6px; }
  .tabs-wrap::-webkit-scrollbar-track { background: transparent; }
  .tabs-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .tab {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    border: 1px solid transparent;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    margin-right: 4px;
    transition: all 0.15s;
  }

  .tab:hover {
    background: var(--card-hover);
    color: var(--text);
  }

  .tab.active {
    background: rgba(91, 140, 255, 0.12);
    color: var(--accent);
    border-color: rgba(91, 140, 255, 0.3);
  }

  .tab.admin {
    color: var(--purple);
  }

  .tab.admin.active {
    background: rgba(168, 116, 255, 0.12);
    color: var(--purple);
    border-color: rgba(168, 116, 255, 0.3);
  }

  .count-badge {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 999px;
    background: rgba(138, 148, 163, 0.15);
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    min-width: 20px;
    text-align: center;
  }

  .tab.active .count-badge {
    background: rgba(91, 140, 255, 0.25);
    color: var(--accent);
  }

  .tab.admin.active .count-badge {
    background: rgba(168, 116, 255, 0.25);
    color: var(--purple);
  }

  /* Data section */
  .data-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .data-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .data-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .data-meta {
    color: var(--muted);
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  /* Export CSV button, lives in the table header */
  .csv-btn {
    background: rgba(91,140,255,0.12);
    color: #5b8cff;
    border: 1px solid rgba(91,140,255,0.3);
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .csv-btn:hover {
    background: rgba(91,140,255,0.2);
  }
  .csv-btn:active {
    transform: scale(0.97);
  }

  /* ─── Leaderboard summary (above the log table) ───────────────────── */
  .lb-wrap {
    margin: 14px 18px 6px;
    padding: 14px 16px 12px;
    background: linear-gradient(135deg, rgba(91,140,255,0.06), rgba(191,90,242,0.04));
    border: 1px solid rgba(91,140,255,0.2);
    border-radius: 10px;
  }
  .lb-head {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; font-weight: 700; letter-spacing: 0.6px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
  }
  .lb-head .lb-sub { font-weight: 500; letter-spacing: 0; text-transform: none; font-size: 11px; }
  .lb-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .lb-table th {
    text-align: left; font-size: 11px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.04em;
    padding: 6px 10px; border-bottom: 1px solid var(--border);
  }
  .lb-table td {
    padding: 8px 10px;
    border-bottom: 1px solid rgba(34,43,56,0.5);
    color: var(--text);
  }
  .lb-table tr:last-child td { border-bottom: none; }
  .lb-rank { font-weight: 700; color: var(--muted); width: 42px; text-align: center; }
  .lb-rank.gold   { color: #fbbf24; font-size: 14px; }
  .lb-rank.silver { color: #c0c0c0; font-size: 13px; }
  .lb-rank.bronze { color: #cd7f32; font-size: 13px; }
  .lb-name { font-weight: 600; }
  .lb-num  { font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 12px; white-space: nowrap; }
  .lb-util-good { color: #4ade80; font-weight: 700; }
  .lb-util-ok   { color: #fbbf24; font-weight: 700; }
  .lb-util-low  { color: #ff6b5b; font-weight: 700; }
  .lb-empty { text-align: center; padding: 14px; color: var(--muted); font-size: 12px; }

  .table-wrap {
    overflow-x: auto;
    max-height: calc(100vh - 340px);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .table-wrap::-webkit-scrollbar { height: 8px; width: 8px; }
  .table-wrap::-webkit-scrollbar-track { background: transparent; }
  .table-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    position: sticky;
    top: 0;
    background: #1a212b;
    color: var(--muted);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    text-align: left;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    z-index: 1;
  }

  tbody td {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(34, 43, 56, 0.5);
    color: var(--text);
    vertical-align: top;
  }

  tbody tr:nth-child(odd) { background: rgba(255,255,255,0.015); }
  tbody tr:hover { background: rgba(91, 140, 255, 0.06); }

  tbody td.col-time {
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  tbody td.col-duration {
    font-family: "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px;
    white-space: nowrap;
  }

  .status-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .status-pill.completed { background: rgba(74, 222, 128, 0.15); color: var(--green); }
  .status-pill.in-progress, .status-pill.running { background: rgba(251, 191, 36, 0.15); color: var(--yellow); }
  .status-pill.cancelled, .status-pill.stopped { background: rgba(248, 113, 113, 0.15); color: var(--red); }

  /* Empty / error / loading states */
  .state {
    padding: 60px 24px;
    text-align: center;
    color: var(--muted);
  }

  .state h2 {
    color: var(--text);
    font-size: 16px;
    margin: 0 0 8px 0;
    font-weight: 600;
  }

  .state p {
    margin: 4px 0;
    font-size: 13px;
  }

  .state .actions {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  /* TL gate — whitelist-only email access */
  .email-prompt {
    max-width: 500px;
    margin: 60px auto;
    padding: 40px 36px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  }
  .email-prompt .logo-circle {
    width: 72px;
    height: 72px;
    border-radius: 18px;
    background: linear-gradient(135deg, #ff9f0a 0%, #ff453a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 18px;
    font-size: 36px;
    box-shadow: 0 12px 28px rgba(255,159,10,0.35);
  }
  .email-prompt h2 {
    margin: 0 0 6px 0;
    font-size: 22px;
    font-weight: 700;
  }
  .email-prompt .sub {
    color: var(--muted);
    margin: 0 0 20px 0;
    font-size: 13px;
    line-height: 1.5;
  }
  /* Daily quote card */
  .quote-card {
    background: linear-gradient(135deg, rgba(91,140,255,0.10), rgba(191,90,242,0.06));
    border: 1px solid rgba(91,140,255,0.25);
    padding: 16px 18px;
    border-radius: 12px;
    margin: 0 0 22px 0;
    text-align: left;
  }
  .quote-text {
    font-size: 14px;
    line-height: 1.55;
    color: #e8eaed;
    font-style: italic;
  }
  .quote-author {
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  /* Form */
  .email-prompt form {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .email-prompt input {
    padding: 13px 14px;
    font-size: 14px;
    background: rgba(0,0,0,0.25);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    text-align: center;
  }
  .email-prompt input:focus {
    outline: none;
    border-color: rgba(255,159,10,0.55);
    box-shadow: 0 0 0 3px rgba(255,159,10,0.15);
  }
  .start-day-btn {
    padding: 14px 18px;
    background: linear-gradient(135deg, #ff9f0a, #ff453a);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 10px 28px rgba(255,69,58,0.30), inset 0 1px 0 rgba(255,255,255,0.22);
    transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
    letter-spacing: 0.2px;
  }
  .start-day-btn:hover {
    transform: translateY(-1px);
    filter: brightness(1.04);
    box-shadow: 0 14px 34px rgba(255,69,58,0.42), inset 0 1px 0 rgba(255,255,255,0.28);
  }
  .start-day-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }
  .gate-hint {
    margin-top: 16px;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
  }
  .gate-error {
    margin-top: 14px;
    padding: 11px 14px;
    background: rgba(255,69,58,0.12);
    border: 1px solid rgba(255,69,58,0.35);
    border-radius: 10px;
    color: #ff8b80;
    font-size: 13px;
    text-align: left;
    display: none;
  }
  .gate-error.show { display: block; }

  .error-card {
    background: rgba(248, 113, 113, 0.08);
    border: 1px solid rgba(248, 113, 113, 0.3);
  }

  .hidden { display: none !important; }

  /* ── Live Activity tab ──────────────────────────────────────── */
  .live-team-card {
    padding: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
  }
  .live-team-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .live-team-name {
    font-weight: 600;
    font-size: 15px;
  }
  .live-users {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }
  .live-user {
    background: var(--card-hover);
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .live-user-name {
    font-weight: 600;
    font-size: 13px;
  }
  .live-user-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }
  .live-user-stale {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    font-style: italic;
  }
  .live-user-shift {
    font-size: 11px;
    color: #30d158;
    margin-top: 2px;
    font-weight: 500;
  }
  .live-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    margin-left: 6px;
    letter-spacing: 0.03em;
  }
  .live-badge.production { background: rgba(74, 222, 128, 0.15); color: var(--green); }
  .live-badge.break      { background: rgba(251, 191, 36, 0.15); color: var(--yellow); }
  .live-badge.meeting    { background: rgba(168, 116, 255, 0.15); color: var(--purple); }
  .live-badge.training   { background: rgba(91, 140, 255, 0.15); color: var(--blue); }
  .live-badge.dinner     { background: rgba(255, 159, 10, 0.15); color: #ff9f0a; }
  .live-badge.idle       { background: rgba(138, 148, 163, 0.15); color: var(--muted); }
</style>
</head>
<body>
  <div class="container">

    <!-- TL whitelist gate (shown until email verified against Whitelist tab) -->
    <div id="emailPrompt" class="email-prompt hidden">
      <div class="logo-circle">🌅</div>
      <h2 id="gateGreet">Good morning, Team Lead</h2>
      <p class="sub">Enter your Opendoor email to open your team's dashboard.</p>

      <!-- Daily leadership quote -->
      <div class="quote-card">
        <div class="quote-text" id="quoteText">—</div>
        <div class="quote-author" id="quoteAuthor">—</div>
      </div>

      <form id="emailForm">
        <input type="email" id="emailInput" placeholder="you@opendoor.com" required autocomplete="email" />
        <button type="submit" class="start-day-btn" id="startDayBtn">🌅 Start Your Day</button>
      </form>

      <div id="gateError" class="gate-error"></div>

      <p class="gate-hint">
        Access is restricted to emails on the TL Whitelist.<br>
        If you need access, message <b>@arun</b> on Slack.
      </p>
    </div>

    <!-- Main dashboard -->
    <div id="dashboard" class="hidden">
      <div class="header">
        <h1>Team Time Tracker — TL Dashboard</h1>
        <div class="header-right">
          <span id="emailChip" class="email-chip"></span>
          <span id="roleBadge" class="role-badge tl">TL</span>
          <input type="date" id="datePicker" />
          <button id="refreshBtn" class="secondary">
            <span id="refreshLabel">Refresh</span>
          </button>
          <span id="updatedAt" class="updated-at"></span>
        </div>
      </div>

      <div id="tabs" class="tabs-wrap hidden"></div>

      <div id="content">
        <div class="state">
          <div class="spinner" style="border-color: rgba(138,148,163,0.3); border-top-color: var(--accent); width: 20px; height: 20px;"></div>
          <p style="margin-top: 12px;">Loading…</p>
        </div>
      </div>
    </div>

  </div>

<script>
(function () {
  'use strict';

  const API_URL = 'https://script.google.com/macros/s/AKfycbxkBAtowwxWuKkaga-aR93ssyxuygFZC-zYXsdm22aVKhXWB45E4YKMKVmc0Ty_ByFk/exec';

  // ---- State ----
  const state = {
    email: '',
    date: '',
    data: null,
    selectedTab: null,
    lastFetchAt: null,
    loading: false,
    liveData: null,
    livePollTimer: null,
    liveLoading: false,
    liveError: null,
  };

  // ---- DOM ----
  const $ = (id) => document.getElementById(id);
  const emailPrompt = $('emailPrompt');
  const emailForm = $('emailForm');
  const emailInput = $('emailInput');
  const dashboard = $('dashboard');
  const emailChip = $('emailChip');
  const roleBadge = $('roleBadge');
  const datePicker = $('datePicker');
  const refreshBtn = $('refreshBtn');
  const refreshLabel = $('refreshLabel');
  const updatedAt = $('updatedAt');
  const tabsEl = $('tabs');
  const contentEl = $('content');

  // ---- URL helpers ----
  function getParams() {
    const p = new URLSearchParams(window.location.search);
    return {
      email: (p.get('email') || '').trim(),
      date: (p.get('date') || '').trim(),
    };
  }

  function updateUrl(email, date) {
    const p = new URLSearchParams();
    if (email) p.set('email', email);
    if (date) p.set('date', date);
    const newUrl = window.location.pathname + '?' + p.toString();
    window.history.pushState({}, '', newUrl);
  }

  function todayIsoLocal() {
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
  }

  // ---- API ----
  async function fetchData() {
    state.loading = true;
    setRefreshLoading(true);

    const url = `${API_URL}?action=tlDashboard&email=${encodeURIComponent(state.email)}&date=${encodeURIComponent(state.date)}`;

    try {
      const res = await fetch(url, { method: 'GET' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();

      if (!json.ok) {
        renderApiError(json.error || 'unknown_error');
        return;
      }

      state.data = json;
      state.lastFetchAt = new Date();

      // Preserve selected tab if still valid, else pick first team tab
      // (skipping __live so users land on their team data by default).
      const validTabs = getAllTabKeys(json);
      if (!state.selectedTab || !validTabs.includes(state.selectedTab)) {
        const firstNonLive = validTabs.find(k => k !== '__live');
        state.selectedTab = firstNonLive || validTabs[0] || null;
      }

      // Ensure polling reflects the selected tab after a data refresh.
      if (state.selectedTab === '__live' && !state.livePollTimer) {
        startLivePolling();
      } else if (state.selectedTab !== '__live' && state.livePollTimer) {
        stopLivePolling();
      }

      renderDashboard();
    } catch (err) {
      renderNetworkError(err);
    } finally {
      state.loading = false;
      setRefreshLoading(false);
      updateUpdatedAt();
    }
  }

  function setRefreshLoading(isLoading) {
    if (isLoading) {
      refreshBtn.disabled = true;
      refreshLabel.innerHTML = '<span class="spinner" style="border-color: rgba(230,237,245,0.3); border-top-color: var(--text);"></span> Refreshing';
    } else {
      refreshBtn.disabled = false;
      refreshLabel.textContent = 'Refresh';
    }
  }

  // ---- Rendering ----
  function getAllTabKeys(data) {
    const keys = ['__live'];
    if (data.teams && Array.isArray(data.teams)) {
      data.teams.forEach(t => keys.push(t));
    }
    if (data.isAdmin) {
      ['attendance', 'sessions', 'whitelist', 'config'].forEach(k => {
        if (data[k]) keys.push('__' + k);
      });
    }
    return keys;
  }

  function renderDashboard() {
    const data = state.data;

    emailChip.textContent = data.email || state.email;
    if (data.role === 'super_admin' || data.isAdmin) {
      roleBadge.textContent = 'Super Admin';
      roleBadge.className = 'role-badge super-admin';
    } else {
      roleBadge.textContent = 'TL';
      roleBadge.className = 'role-badge tl';
    }

    renderTabs();
    renderContent();
  }

  function renderTabs() {
    const data = state.data;
    const teams = data.teams || [];
    tabsEl.innerHTML = '';
    tabsEl.classList.remove('hidden');

    // Live Activity tab — visible to every authenticated user, always first.
    {
      const liveCount = state.liveData && Array.isArray(state.liveData.users)
        ? state.liveData.users.length
        : 0;
      const liveTab = document.createElement('button');
      liveTab.className = 'tab' + (state.selectedTab === '__live' ? ' active' : '');
      liveTab.innerHTML = `🔴 Live Activity <span class="count-badge">${liveCount}</span>`;
      liveTab.addEventListener('click', () => {
        selectTab('__live');
      });
      tabsEl.appendChild(liveTab);
    }

    teams.forEach(team => {
      const logs = (data.logs && data.logs[team]) || { rows: [] };
      const count = (logs.rows || []).length;
      const tab = document.createElement('button');
      tab.className = 'tab' + (state.selectedTab === team ? ' active' : '');
      tab.innerHTML = `${escapeHtml(team)} <span class="count-badge">${count}</span>`;
      tab.addEventListener('click', () => {
        selectTab(team);
      });
      tabsEl.appendChild(tab);
    });

    if (data.isAdmin) {
      const adminTabs = [
        { key: '__attendance', label: 'Attendance', source: data.attendance },
        { key: '__sessions', label: 'Sessions', source: data.sessions },
        { key: '__whitelist', label: 'Whitelist', source: data.whitelist },
        { key: '__config', label: 'Config', source: data.config },
      ];
      adminTabs.forEach(({ key, label, source }) => {
        if (!source) return;
        const count = getAdminRowCount(source);
        const tab = document.createElement('button');
        tab.className = 'tab admin' + (state.selectedTab === key ? ' active' : '');
        tab.innerHTML = `${escapeHtml(label)} <span class="count-badge">${count}</span>`;
        tab.addEventListener('click', () => {
          selectTab(key);
        });
        tabsEl.appendChild(tab);
      });
    }
  }

  // Centralised tab switcher — handles live-polling start/stop side effects.
  function selectTab(key) {
    const prev = state.selectedTab;
    state.selectedTab = key;
    if (prev !== '__live' && key === '__live') {
      startLivePolling();
    } else if (prev === '__live' && key !== '__live') {
      stopLivePolling();
    }
    renderTabs();
    renderContent();
  }

  function getAdminRowCount(source) {
    if (!source) return 0;
    if (Array.isArray(source)) {
      return Math.max(0, source.length - 1);
    }
    return (source.rows || []).length;
  }

  function renderContent() {
    const data = state.data;
    const sel = state.selectedTab;

    if (!sel) {
      contentEl.innerHTML = `
        <div class="data-card">
          <div class="state">
            <h2>No teams available</h2>
            <p>Your account has no teams assigned. Contact arun.mohan@opendoor.com.</p>
          </div>
        </div>`;
      return;
    }

    if (sel === '__live') {
      renderLiveView();
      return;
    }

    let title, header, rows;

    if (sel.startsWith('__')) {
      const key = sel.slice(2);
      const source = data[key];
      title = { attendance: 'Attendance', sessions: 'Sessions', whitelist: 'Whitelist', config: 'Config' }[key];
      if (Array.isArray(source)) {
        header = source[0] || [];
        rows = source.slice(1);
      } else {
        header = (source && source.header) || [];
        rows = (source && source.rows) || [];
      }
    } else {
      title = sel;
      const entry = (data.logs && data.logs[sel]) || { header: [], rows: [] };
      header = entry.header || [];
      rows = entry.rows || [];
    }

    const dateStr = data.date || state.date;

    if (!rows.length) {
      contentEl.innerHTML = `
        <div class="data-card">
          <div class="data-header">
            <div class="data-title">${escapeHtml(title)}</div>
            <div class="data-meta">${escapeHtml(dateStr)}</div>
          </div>
          <div class="state">
            <p>No entries logged for ${escapeHtml(title)} on ${escapeHtml(dateStr)}.</p>
          </div>
        </div>`;
      return;
    }

    // For team tabs (not admin tabs), compute & render the leaderboard
    const leaderboardHtml = !sel.startsWith('__')
      ? buildLeaderboardHtml(sel, header, rows, data.sessions)
      : '';

    contentEl.innerHTML = `
      <div class="data-card">
        <div class="data-header">
          <div class="data-title">${escapeHtml(title)}</div>
          <div class="data-meta">
            ${rows.length} ${rows.length === 1 ? 'entry' : 'entries'} · ${escapeHtml(dateStr)}
            <button class="csv-btn" id="csvExportBtn" title="Download as CSV">⬇ Export CSV</button>
          </div>
        </div>
        ${leaderboardHtml}
        <div class="table-wrap">
          <table>
            <thead>
              <tr>${header.map(h => `<th>${escapeHtml(String(h))}</th>`).join('')}</tr>
            </thead>
            <tbody>
              ${rows.map(row => renderRow(row, header)).join('')}
            </tbody>
          </table>
        </div>
      </div>`;

    // Wire up CSV export for the currently selected tab
    const csvBtn = document.getElementById('csvExportBtn');
    if (csvBtn) {
      csvBtn.addEventListener('click', () => downloadCsv(title, header, rows, dateStr));
    }
  }

  // ── Leaderboard ────────────────────────────────────────────────────
  // Aggregates rows by user and computes: Tasks, Prod hrs, Throughput, Utilization %.
  //   Tasks       = count of non-system rows where activity === 'production'
  //   Prod hrs    = sum of durations (from Duration column, parsed from "Xh Ym Zs")
  //   Throughput  = Tasks / Prod hrs
  //   Util %      = Sessions-tab productionMin / (prodMin + breakMin + idleMin) * 100
  //                 if Sessions row exists for this user+date (end-of-shift data).
  //                 Fallback: prod time / (last-first task timestamp span) — shown as "*".
  function buildLeaderboardHtml(team, header, rows, sessionsBlock) {
    if (!rows || !rows.length) return '';

    // Locate columns by header label (resilient to per-team col variations)
    const hLower = header.map(h => String(h).toLowerCase());
    const userIdx  = hLower.indexOf('user');
    const actIdx   = hLower.indexOf('activity');
    const durIdx   = hLower.indexOf('duration');
    const sysIdx   = hLower.indexOf('system');
    const timeIdx  = 0; // first col is always timestamp

    if (userIdx < 0 || durIdx < 0) return ''; // can't compute without these

    // Parse "Xh Ym Zs" → seconds
    const parseDur = (s) => {
      const str = String(s || '');
      const h = /(\d+)\s*h/i.exec(str); const hr = h ? +h[1] : 0;
      const m = /(\d+)\s*m/i.exec(str); const mn = m ? +m[1] : 0;
      const sec = /(\d+)\s*s/i.exec(str); const sc = sec ? +sec[1] : 0;
      return hr * 3600 + mn * 60 + sc;
    };

    const users = {}; // user → { tasks, prodSec, firstTs, lastTs }
    rows.forEach(r => {
      const user = String(r[userIdx] || '').trim();
      if (!user) return;
      const act = String(r[actIdx] || 'production').toLowerCase();
      const isSystem = sysIdx >= 0 && String(r[sysIdx] || '').toUpperCase() === 'TRUE';
      const durSec = parseDur(r[durIdx]);
      const ts = String(r[timeIdx] || '');

      const u = users[user] || (users[user] = { tasks: 0, prodSec: 0, firstTs: ts, lastTs: ts });
      if (ts && ts < u.firstTs) u.firstTs = ts;
      if (ts && ts > u.lastTs)  u.lastTs  = ts;
      if (act === 'production' && !isSystem) {
        u.tasks += 1;
        u.prodSec += durSec;
      }
    });

    // Pull Sessions data for util % if available
    const sessMap = {}; // user → { prodMin, breakMin, idleMin }
    if (sessionsBlock && sessionsBlock.header && sessionsBlock.rows) {
      const sh = sessionsBlock.header.map(h => String(h).toLowerCase());
      const sUserIdx = sh.indexOf('user');
      const sProdIdx = sh.findIndex(x => x.includes('production'));
      const sBreakIdx = sh.findIndex(x => x.includes('break'));
      const sIdleIdx = sh.findIndex(x => x.includes('idle'));
      if (sUserIdx >= 0) {
        sessionsBlock.rows.forEach(sr => {
          const u = String(sr[sUserIdx] || '').trim();
          if (!u) return;
          sessMap[u] = {
            prodMin:  Number(sr[sProdIdx]) || 0,
            breakMin: Number(sr[sBreakIdx]) || 0,
            idleMin:  Number(sr[sIdleIdx]) || 0
          };
        });
      }
    }

    // Compute final stats per user
    const list = Object.keys(users).map(u => {
      const { tasks, prodSec, firstTs, lastTs } = users[u];
      const prodHrs = prodSec / 3600;
      const throughput = prodHrs >= 0.05 && tasks > 0 ? (tasks / prodHrs) : null;

      // Utilization: prefer Sessions tab data (end-of-shift)
      let util = null, utilSource = null;
      const sess = sessMap[u];
      if (sess && (sess.prodMin + sess.breakMin + sess.idleMin) > 0) {
        util = Math.round((sess.prodMin / (sess.prodMin + sess.breakMin + sess.idleMin)) * 100);
        utilSource = 'session';
      } else if (firstTs && lastTs && firstTs !== lastTs) {
        // Fallback: span between first and last task timestamp (approximate)
        const spanSec = (new Date(lastTs).getTime() - new Date(firstTs).getTime()) / 1000;
        if (spanSec > 60) {
          util = Math.min(100, Math.round((prodSec / spanSec) * 100));
          utilSource = 'approx';
        }
      }

      return { user: u, tasks, prodHrs, throughput, util, utilSource };
    });

    // Rank by tasks desc, then prodHrs desc
    list.sort((a, b) => (b.tasks - a.tasks) || (b.prodHrs - a.prodHrs));

    if (!list.length) return '';

    const fmtHrs = (h) => {
      const totalMin = Math.round(h * 60);
      const hr = Math.floor(totalMin / 60);
      const mn = totalMin % 60;
      return `${hr}h ${String(mn).padStart(2,'0')}m`;
    };

    const rankSymbol = (i) => {
      if (i === 0) return { label: '🥇', cls: 'gold' };
      if (i === 1) return { label: '🥈', cls: 'silver' };
      if (i === 2) return { label: '🥉', cls: 'bronze' };
      return { label: String(i + 1), cls: '' };
    };

    const rowsHtml = list.map((p, i) => {
      const r = rankSymbol(i);
      let utilCell = '<span style="color:var(--muted);">—</span>';
      if (p.util !== null) {
        const cls = p.util >= 75 ? 'lb-util-good' : (p.util >= 50 ? 'lb-util-ok' : 'lb-util-low');
        const mark = p.utilSource === 'approx' ? '<span title="approximate — end-of-shift data not yet available" style="color:var(--muted); font-size:10px;"> *</span>' : '';
        utilCell = `<span class="${cls}">${p.util}%</span>${mark}`;
      }
      const tputCell = p.throughput !== null
        ? `${(p.throughput >= 10 ? p.throughput.toFixed(0) : p.throughput.toFixed(1))}/hr`
        : '—';
      return `
        <tr>
          <td class="lb-rank ${r.cls}">${r.label}</td>
          <td class="lb-name">${escapeHtml(p.user)}</td>
          <td class="lb-num" style="text-align:right;">${p.tasks}</td>
          <td class="lb-num" style="text-align:right;">${utilCell}</td>
          <td class="lb-num" style="text-align:right;">${tputCell}</td>
          <td class="lb-num" style="text-align:right;">${fmtHrs(p.prodHrs)}</td>
        </tr>`;
    }).join('');

    const anyApprox = list.some(p => p.utilSource === 'approx');
    const hint = anyApprox
      ? 'Util % marked <b>*</b> is approximate (end-of-shift data not yet written).'
      : 'Ranked by Tasks completed.';

    return `
      <div class="lb-wrap">
        <div class="lb-head">
          <span>🏆 Team Leaderboard — ${escapeHtml(team)}</span>
          <span class="lb-sub">${hint}</span>
        </div>
        <table class="lb-table">
          <thead>
            <tr>
              <th style="width:42px;">#</th>
              <th>Name</th>
              <th style="text-align:right;">Tasks</th>
              <th style="text-align:right;">Utilization</th>
              <th style="text-align:right;">Throughput</th>
              <th style="text-align:right;">Prod hrs</th>
            </tr>
          </thead>
          <tbody>${rowsHtml}</tbody>
        </table>
      </div>`;
  }

  // ── CSV export ────────────────────────────────────────────────────
  // Builds a CSV from the currently rendered table and triggers a download.
  // Filename format: "SD_2026-04-22.csv" (tab name, slashes/spaces sanitized).
  function downloadCsv(title, header, rows, dateStr) {
    const escapeCsv = (v) => {
      if (v == null) return '';
      const s = String(v);
      // Quote if the value contains quote, comma, newline
      if (/["\n,\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
      return s;
    };
    const lines = [];
    lines.push(header.map(escapeCsv).join(','));
    rows.forEach(row => {
      const padded = header.map((_, i) => (row && row[i] !== undefined) ? row[i] : '');
      lines.push(padded.map(escapeCsv).join(','));
    });
    const csv = '\uFEFF' + lines.join('\n');  // BOM for Excel UTF-8 compat
    const safeTitle = String(title).replace(/[^a-z0-9]+/gi, '_').replace(/^_|_$/g, '');
    const filename = `${safeTitle}_${dateStr}.csv`;
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  }

  function renderRow(row, header) {
    const cells = (row || []).map((val, i) => {
      const colName = String(header[i] || '').toLowerCase();
      const display = formatCell(val);

      if (colName === 'time') {
        return `<td class="col-time">${escapeHtml(display)}</td>`;
      }
      if (colName === 'duration') {
        return `<td class="col-duration">${escapeHtml(display)}</td>`;
      }
      if (colName === 'status') {
        const cls = display.toLowerCase().replace(/\s+/g, '-');
        return `<td><span class="status-pill ${escapeHtml(cls)}">${escapeHtml(display)}</span></td>`;
      }
      return `<td>${escapeHtml(display)}</td>`;
    });
    return `<tr>${cells.join('')}</tr>`;
  }

  function formatCell(val) {
    if (val === null || val === undefined) return '';
    if (typeof val === 'string') return val;
    if (typeof val === 'number') return String(val);
    if (typeof val === 'boolean') return val ? 'true' : 'false';
    if (val instanceof Date) return val.toISOString();
    if (typeof val === 'object') {
      try { return JSON.stringify(val); } catch (e) { return String(val); }
    }
    return String(val);
  }

  // ── Live Activity ──────────────────────────────────────────────────
  // Polls ${API_URL}?action=liveActivity every 15s while the Live tab is
  // active. Rendering is split from fetching so the initial click shows
  // whatever we already have (possibly "loading") without blocking.
  const LIVE_POLL_MS = 15000;
  const KNOWN_ACTIVITIES = ['production', 'break', 'meeting', 'training', 'dinner', 'idle'];

  async function fetchLiveActivity() {
    if (state.liveLoading) return;
    state.liveLoading = true;
    try {
      const email = encodeURIComponent(state.email || '');
      const res = await fetch(`${API_URL}?action=liveActivity&email=${email}`, { method: 'GET' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || 'unknown_error');
      state.liveData = json;
      state.liveError = null;
    } catch (err) {
      state.liveError = err.message || String(err);
    } finally {
      state.liveLoading = false;
      if (state.selectedTab === '__live') {
        renderLiveView();
        // Keep the count-badge in the Live tab header in sync.
        renderTabs();
      }
    }
  }

  function startLivePolling() {
    stopLivePolling();
    // Fire an immediate fetch; the view below will render a loading state
    // until the promise resolves.
    fetchLiveActivity();
    state.livePollTimer = setInterval(fetchLiveActivity, LIVE_POLL_MS);
  }

  function stopLivePolling() {
    if (state.livePollTimer) {
      clearInterval(state.livePollTimer);
      state.livePollTimer = null;
    }
  }

  function activityClass(activity) {
    const a = String(activity || '').toLowerCase();
    return KNOWN_ACTIVITIES.indexOf(a) >= 0 ? a : 'idle';
  }

  function renderLiveView() {
    const live = state.liveData;
    const err = state.liveError;

    // Initial loading state — no data yet, no error yet.
    if (!live && !err) {
      contentEl.innerHTML = `
        <div class="data-card">
          <div class="data-header">
            <div class="data-title">🔴 Live Activity</div>
            <div class="data-meta">Polling every 15s</div>
          </div>
          <div class="state">
            <div class="spinner" style="border-color: rgba(138,148,163,0.3); border-top-color: var(--accent); width: 20px; height: 20px;"></div>
            <p style="margin-top: 12px;">Loading live activity…</p>
          </div>
        </div>`;
      return;
    }

    if (err && !live) {
      contentEl.innerHTML = `
        <div class="data-card error-card">
          <div class="data-header">
            <div class="data-title">🔴 Live Activity</div>
          </div>
          <div class="state">
            <p style="color: var(--red);">Couldn't load live activity: ${escapeHtml(err)}</p>
          </div>
        </div>`;
      return;
    }

    const users = Array.isArray(live.users) ? live.users : [];
    const byTeam = live.byTeam && typeof live.byTeam === 'object' ? live.byTeam : {};

    if (users.length === 0) {
      contentEl.innerHTML = `
        <div class="data-card">
          <div class="data-header">
            <div class="data-title">🔴 Live Activity</div>
            <div class="data-meta">Polling every 15s${err ? ' · last fetch failed' : ''}</div>
          </div>
          <div class="state">
            <p>No one is active right now.</p>
          </div>
        </div>`;
      return;
    }

    const teamNames = Object.keys(byTeam).sort();
    const teamCardsHtml = teamNames.map(teamName => {
      const members = Array.isArray(byTeam[teamName]) ? byTeam[teamName] : [];
      const chipsHtml = members.map(u => {
        const act = activityClass(u.activity);
        const tasks = Number(u.tasksDone || 0);
        const prod = Math.round(Number(u.prodMin || 0));
        const brk = Math.round(Number(u.breakMin || 0));
        const age = Number(u.ageMin || 0);
        const staleHtml = age > 2
          ? `<div class="live-user-stale">⚠️ stale ${Math.round(age)}m ago</div>`
          : '';
        // Shift start — show only the HH:MM of IST wall clock (e.g. "09:12")
        const shiftStart = String(u.shiftStartAt || '');
        const shiftStartHm = (shiftStart.match(/\s(\d{2}:\d{2})/) || [])[1] || '';
        const shiftHtml = shiftStartHm
          ? `<div class="live-user-shift">🟢 Shift: ${shiftStartHm} IST</div>`
          : '';
        return `
          <div class="live-user">
            <div class="live-user-name">
              ${escapeHtml(u.user || '—')}
              <span class="live-badge ${act}">${escapeHtml(String(u.activity || 'idle'))}</span>
            </div>
            <div class="live-user-meta">${tasks} tasks · ${prod}m prod · ${brk}m break</div>
            ${shiftHtml}
            ${staleHtml}
          </div>`;
      }).join('');

      return `
        <div class="live-team-card">
          <div class="live-team-head">
            <div class="live-team-name">${escapeHtml(teamName)}</div>
            <span class="count-badge">${members.length}</span>
          </div>
          <div class="live-users">${chipsHtml}</div>
        </div>`;
    }).join('');

    const headerMeta = `${users.length} active · polling every 15s${err ? ' · last fetch failed' : ''}`;
    contentEl.innerHTML = `
      <div class="data-card">
        <div class="data-header">
          <div class="data-title">🔴 Live Activity</div>
          <div class="data-meta">${escapeHtml(headerMeta)}</div>
        </div>
        ${teamCardsHtml}
      </div>`;
  }

  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // ---- Error states ----
  function renderApiError(errCode) {
    tabsEl.classList.add('hidden');
    let msg = '';
    if (errCode === 'not_whitelisted') {
      msg = `You're not on the TL whitelist. Contact arun.mohan@opendoor.com.`;
    } else if (errCode === 'missing_email') {
      msg = `Add ?email=you@opendoor.com to the URL.`;
    } else {
      msg = `Error: ${errCode}`;
    }
    contentEl.innerHTML = `
      <div class="data-card error-card">
        <div class="state">
          <h2 style="color: var(--red);">Unable to load dashboard</h2>
          <p style="color: var(--red);">${escapeHtml(msg)}</p>
          <div class="actions">
            <button onclick="window.location.reload()">Reload</button>
          </div>
        </div>
      </div>`;
  }

  function renderNetworkError(err) {
    tabsEl.classList.add('hidden');
    contentEl.innerHTML = `
      <div class="data-card error-card">
        <div class="state">
          <h2 style="color: var(--red);">Network error</h2>
          <p style="color: var(--red);">${escapeHtml(err.message || String(err))}</p>
          <div class="actions">
            <button id="retryBtn">Retry</button>
          </div>
        </div>
      </div>`;
    const retry = $('retryBtn');
    if (retry) retry.addEventListener('click', fetchData);
  }

  // ---- Updated timestamp ----
  function updateUpdatedAt() {
    if (!state.lastFetchAt) {
      updatedAt.textContent = '';
      return;
    }
    const secs = Math.floor((Date.now() - state.lastFetchAt.getTime()) / 1000);
    let label;
    if (secs < 5) label = 'Updated just now';
    else if (secs < 60) label = `Updated ${secs}s ago`;
    else if (secs < 3600) label = `Updated ${Math.floor(secs / 60)}m ago`;
    else label = `Updated ${Math.floor(secs / 3600)}h ago`;
    updatedAt.textContent = label;
  }
  setInterval(updateUpdatedAt, 10000);

  // ---- Event wiring ----
  datePicker.addEventListener('change', () => {
    state.date = datePicker.value;
    updateUrl(state.email, state.date);
    fetchData();
  });

  refreshBtn.addEventListener('click', () => {
    if (!state.loading) fetchData();
  });

  // ── Leadership quotes — rotate daily by day-of-year ───────────────
  const LEADERSHIP_QUOTES = [
    { q: "A leader is one who knows the way, goes the way, and shows the way.", a: "John C. Maxwell" },
    { q: "The strength of the team is each individual member. The strength of each member is the team.", a: "Phil Jackson" },
    { q: "The price of greatness is responsibility.", a: "Winston Churchill" },
    { q: "A good leader takes a little more than their share of the blame, a little less than their share of the credit.", a: "Arnold H. Glasow" },
    { q: "Leaders become great not because of their power but because of their ability to empower others.", a: "John C. Maxwell" },
    { q: "The function of leadership is to produce more leaders, not more followers.", a: "Ralph Nader" },
    { q: "People don't buy what you do, they buy why you do it.", a: "Simon Sinek" },
    { q: "The best way to predict the future is to create it.", a: "Peter Drucker" },
    { q: "Great leaders don't set out to be a leader — they set out to make a difference.", a: "Jeremy Bravo" },
    { q: "A leader is best when people barely know he exists; when his work is done, his aim fulfilled, they will say: we did it ourselves.", a: "Lao Tzu" },
    { q: "Do not follow where the path may lead. Go instead where there is no path and leave a trail.", a: "Ralph Waldo Emerson" },
    { q: "The leader has to be practical and a realist, yet must talk the language of the visionary and the idealist.", a: "Eric Hoffer" },
    { q: "Management is doing things right; leadership is doing the right things.", a: "Peter Drucker" },
    { q: "Before you are a leader, success is all about growing yourself. When you become a leader, success is all about growing others.", a: "Jack Welch" },
    { q: "Leadership is the capacity to translate vision into reality.", a: "Warren Bennis" },
    { q: "The greatest leader is not necessarily the one who does the greatest things. He is the one who gets the people to do the greatest things.", a: "Ronald Reagan" },
    { q: "You don't lead by pointing and telling people some place to go. You lead by going to that place and making a case.", a: "Ken Kesey" },
    { q: "Earn your leadership every day.", a: "Michael Jordan" },
    { q: "Leadership is not about titles, positions, or flowcharts. It is about one life influencing another.", a: "John C. Maxwell" },
    { q: "If your actions inspire others to dream more, learn more, do more, and become more, you are a leader.", a: "John Quincy Adams" },
    { q: "The pessimist complains about the wind. The optimist expects it to change. The leader adjusts the sails.", a: "John Maxwell" },
    { q: "Whatever you are, be a good one.", a: "Abraham Lincoln" },
    { q: "Success is not final, failure is not fatal: It is the courage to continue that counts.", a: "Winston Churchill" },
    { q: "Don't watch the clock; do what it does. Keep going.", a: "Sam Levenson" },
    { q: "The way to get started is to quit talking and begin doing.", a: "Walt Disney" },
    { q: "Quality is not an act, it is a habit.", a: "Aristotle" },
    { q: "It always seems impossible until it's done.", a: "Nelson Mandela" },
    { q: "A ship in harbor is safe, but that is not what ships are built for.", a: "John A. Shedd" },
    { q: "If you want to lift yourself up, lift up someone else.", a: "Booker T. Washington" },
    { q: "The best executive is the one who has sense enough to pick good men to do what he wants done, and self-restraint enough to keep from meddling with them.", a: "Theodore Roosevelt" },
    { q: "Don't find fault, find a remedy.", a: "Henry Ford" },
    { q: "A leader takes people where they want to go. A great leader takes people where they don't necessarily want to go, but ought to be.", a: "Rosalynn Carter" },
    { q: "If you think you are leading and turn around to see no one following, then you are just taking a walk.", a: "Benjamin Hooks" },
    { q: "The task of the leader is to get his people from where they are to where they have not been.", a: "Henry Kissinger" },
    { q: "Leadership is the art of getting someone else to do something you want done because he wants to do it.", a: "Dwight D. Eisenhower" },
    { q: "Do what you can, with what you have, where you are.", a: "Theodore Roosevelt" },
    { q: "Excellence is doing ordinary things extraordinarily well.", a: "John W. Gardner" },
    { q: "The secret of getting ahead is getting started.", a: "Mark Twain" },
    { q: "Coming together is a beginning. Keeping together is progress. Working together is success.", a: "Henry Ford" },
    { q: "When you coach, mentor, or simply help others, the reward is in the reward.", a: "Anonymous" },
  ];
  function dayOfYear(d) {
    const start = new Date(d.getFullYear(), 0, 0);
    return Math.floor((d - start) / 86400000);
  }
  function renderDailyQuote() {
    const q = LEADERSHIP_QUOTES[dayOfYear(new Date()) % LEADERSHIP_QUOTES.length];
    const qt = $('quoteText');
    const qa = $('quoteAuthor');
    if (qt) qt.textContent = `"${q.q}"`;
    if (qa) qa.textContent = `— ${q.a}`;
  }
  function renderGreeting() {
    const hr = new Date().getHours();
    const greet = hr < 12 ? 'Good morning' : (hr < 17 ? 'Good afternoon' : 'Good evening');
    const g = $('gateGreet');
    if (g) g.textContent = `${greet}, Team Lead`;
  }

  // ── Gate: verify email against Whitelist before granting access ───
  function showGateError(msg) {
    const box = $('gateError');
    box.textContent = msg;
    box.classList.add('show');
  }
  function hideGateError() {
    const box = $('gateError');
    box.classList.remove('show');
    box.textContent = '';
  }

  async function verifyEmailAndEnter(email) {
    hideGateError();
    const btn = $('startDayBtn');
    btn.disabled = true;
    btn.textContent = '🔐 Verifying access…';
    try {
      const res = await fetch(`${API_URL}?action=whoami&email=${encodeURIComponent(email)}`);
      const json = await res.json();
      if (!json.ok) {
        showGateError(`Access denied — ${email} is not on the TL Whitelist. Message @arun on Slack to request access.`);
        btn.disabled = false;
        btn.textContent = '🌅 Start Your Day';
        return;
      }
      // Whitelisted — persist for next visit, update URL, show dashboard
      try { localStorage.setItem('ttk_dash_email', email.toLowerCase()); } catch (e) {}
      const d = state.date || todayIsoLocal();
      const newUrl = `${location.pathname}?email=${encodeURIComponent(email)}&date=${encodeURIComponent(d)}`;
      history.replaceState(null, '', newUrl);
      state.email = email.toLowerCase();
      state.date = d;
      emailPrompt.classList.add('hidden');
      dashboard.classList.remove('hidden');
      datePicker.value = state.date;
      fetchData();
    } catch (err) {
      showGateError(`Couldn't reach the server: ${err.message || err}. Check your connection and try again.`);
      btn.disabled = false;
      btn.textContent = '🌅 Start Your Day';
    }
  }

  emailForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const v = emailInput.value.trim().toLowerCase();
    if (!v) return;
    if (!/@opendoor\.com$/i.test(v)) {
      showGateError('Please use your @opendoor.com email address.');
      return;
    }
    verifyEmailAndEnter(v);
  });

  // ---- Init ----
  function init() {
    renderGreeting();
    renderDailyQuote();

    const params = getParams();
    // Prefer URL param; fall back to localStorage so returning TLs skip re-entry
    let email = params.email;
    if (!email) {
      try { email = localStorage.getItem('ttk_dash_email') || ''; } catch (e) { email = ''; }
    }

    if (!email) {
      emailPrompt.classList.remove('hidden');
      dashboard.classList.add('hidden');
      setTimeout(() => { try { emailInput.focus(); } catch(e){} }, 50);
      return;
    }

    // Pre-fill and show gate while we verify — prevents flash of dashboard
    // to a stale/forged email before whitelist check returns.
    emailInput.value = email;
    state.date = params.date || todayIsoLocal();
    emailPrompt.classList.remove('hidden');
    dashboard.classList.add('hidden');
    verifyEmailAndEnter(email);
  }

  init();
})();
</script>
